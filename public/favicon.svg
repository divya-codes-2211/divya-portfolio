    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  
  <g filter="url(#glow)">
    <path d="M 180 140 L 260 140 C 350 140 380 200 380 256 C 380 312 350 372 260 372 L 180 372 Z" 
